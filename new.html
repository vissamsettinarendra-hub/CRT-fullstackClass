<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colour</title>
    <style>
        h1{
            /* color:rgba(255,0,0,5) */
            /*HSL -hue saturation lightness*/
            color: hsl(18%,32%,38%);
        }
        p{
            /*Units:px,%,  */
            font-size: 40px;
            /* %percentage relative to the parent*/
            }
            .parent{
                width: 400px;
            }
            .child{
                width: 50%
            }
            /*em -->relative to parent size*/
            .parent{
                font-size: 20px;
            }
            .child{
                font-size: 2em;
                /*2*parents(20) = 40px*/
            }
            /*rem -->relative to root element*/
            html{
                font-size: 16px;
            }
            h1{
                font-size: 2rem;
                /* 2*html(rem)=32px*/

            }
            /*vh -->Viewport Height*/
            .hero{
                height: 100vh;
                /*100 percent screen hight*/
            }
            /*vw-->viewport width*/
            .banner{
                width: 100vw
            }
    </style>
</head>
<body>
    <h1>creative thinking</h1>
    <p>improving skills</p>
    <div class = "parent">
        hi friends
        <div class = "child">
            bye friends

        </div>
    </div>
    
</body>
</html>
